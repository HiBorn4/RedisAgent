<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow1)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#e2e8f0" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#redGlow)"/>

  <!-- Left decorative panel — terminal window -->
  <rect x="680" y="60" width="540" height="280" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity="0.9"/>
  <!-- terminal titlebar -->
  <rect x="680" y="60" width="540" height="36" rx="10" fill="#1e293b"/>
  <rect x="680" y="82" width="540" height="14" fill="#1e293b"/>
  <circle cx="704" cy="78" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="724" cy="78" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="744" cy="78" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="900" y="83" text-anchor="middle" font-size="11" fill="#475569" font-family="'Courier New', monospace">redis-agent — backend</text>

  <!-- Terminal content -->
  <text x="700" y="120" font-size="11" fill="#475569" font-family="'Courier New', monospace">$ uvicorn main:app --port 8001</text>
  <text x="700" y="140" font-size="11" fill="#22c55e" font-family="'Courier New', monospace">✓ ADK Runner initialized</text>
  <text x="700" y="160" font-size="11" fill="#22c55e" font-family="'Courier New', monospace">✓ MCP stdio connected → server.py</text>
  <text x="700" y="180" font-size="11" fill="#22c55e" font-family="'Courier New', monospace">✓ Redis ping OK (localhost:6379)</text>
  <text x="700" y="200" font-size="11" fill="#22c55e" font-family="'Courier New', monospace">✓ Session: default_session loaded</text>
  <text x="700" y="220" font-size="11" fill="#64748b" font-family="'Courier New', monospace">INFO: Application startup complete.</text>
  <text x="700" y="250" font-size="11" fill="#94a3b8" font-family="'Courier New', monospace">POST /chat → query: "list all keys"</text>
  <text x="700" y="270" font-size="11" fill="#e2e8f0" font-family="'Courier New', monospace">  → list_keys("*")  ·  3 keys found</text>
  <text x="700" y="290" font-size="11" fill="#e2e8f0" font-family="'Courier New', monospace">  → get_key("travel_data_...json")</text>
  <text x="700" y="310" font-size="11" fill="#e2e8f0" font-family="'Courier New', monospace">  → parse JSON  ·  trip_status=APPROVED</text>
  <text x="700" y="330" font-size="11" fill="#fda4af" font-family="'Courier New', monospace">  ← "Trip 2200118440 is APPROVED" ✓</text>

  <!-- Blinking cursor -->
  <rect x="700" y="348" width="8" height="14" fill="#e11d48" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Left side — title block -->
  <text x="60" y="145" font-size="62" font-weight="900" fill="url(#titleGrad)" font-family="'Courier New', monospace" letter-spacing="-1">RedisAgent</text>

  <!-- Red underline -->
  <rect x="60" y="158" width="340" height="3" fill="url(#redGlow)" rx="2"/>

  <!-- Subtitle -->
  <text x="60" y="195" font-size="16" fill="#94a3b8" font-family="'Courier New', monospace">Conversational AI · Redis · MCP · Google ADK</text>

  <!-- Badge row -->
  <g transform="translate(60, 225)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="90" height="24" rx="12" fill="rgba(225,29,72,0.15)" stroke="rgba(225,29,72,0.4)" stroke-width="1"/>
    <text x="45" y="16" text-anchor="middle" font-size="10" fill="#fda4af" font-family="'Courier New', monospace" font-weight="600">GOOGLE ADK</text>
    <!-- Badge 2 -->
    <rect x="100" y="0" width="60" height="24" rx="12" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="130" y="16" text-anchor="middle" font-size="10" fill="#c4b5fd" font-family="'Courier New', monospace" font-weight="600">MCP</text>
    <!-- Badge 3 -->
    <rect x="170" y="0" width="76" height="24" rx="12" fill="rgba(220,56,44,0.15)" stroke="rgba(220,56,44,0.4)" stroke-width="1"/>
    <text x="208" y="16" text-anchor="middle" font-size="10" fill="#fca5a5" font-family="'Courier New', monospace" font-weight="600">REDIS 7.x</text>
    <!-- Badge 4 -->
    <rect x="256" y="0" width="86" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <text x="299" y="16" text-anchor="middle" font-size="10" fill="#6ee7b7" font-family="'Courier New', monospace" font-weight="600">FASTAPI</text>
  </g>

  <!-- Flow diagram — small -->
  <g transform="translate(60, 290)" opacity="0.85">
    <!-- Boxes -->
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="40" y="20" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Courier New', monospace">Streamlit</text>

    <line x1="80" y1="15" x2="110" y2="15" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="106,11 114,15 106,19" fill="#e11d48"/>

    <rect x="114" y="0" width="80" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="154" y="20" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Courier New', monospace">FastAPI</text>

    <line x1="194" y1="15" x2="224" y2="15" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="220,11 228,15 220,19" fill="#e11d48"/>

    <rect x="228" y="0" width="68" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="262" y="20" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="'Courier New', monospace">ADK+MCP</text>

    <line x1="296" y1="15" x2="326" y2="15" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="322,11 330,15 322,19" fill="#e11d48"/>

    <rect x="330" y="0" width="60" height="30" rx="6" fill="#1a0a0a" stroke="rgba(220,56,44,0.5)" stroke-width="1"/>
    <text x="360" y="20" text-anchor="middle" font-size="10" fill="#fca5a5" font-family="'Courier New', monospace">Redis</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="397" width="1280" height="3" fill="url(#redGlow)" opacity="0.4"/>
</svg>
